name: Release package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.3.36"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Validate and package
        run: npm run release:check
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must look like v0.3.36"
            exit 1
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
      - name: Upload workflow artifact bundle
        uses: actions/upload-artifact@v7
        with:
          name: arsonkupik-release-assets-${{ steps.release.outputs.tag }}
          path: |
            release/*.zip
            release/*.sha256
            release/RELEASE_NOTES.md
          retention-days: 30
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release/*.zip release/*.sha256 --clobber
            gh release edit "${RELEASE_TAG}" \
              --title "ArSonKuPik ${RELEASE_TAG}" \
              --notes-file release/RELEASE_NOTES.md
          else
            gh release create "${RELEASE_TAG}" \
              release/*.zip \
              release/*.sha256 \
              --target "${GITHUB_SHA}" \
              --title "ArSonKuPik ${RELEASE_TAG}" \
              --notes-file release/RELEASE_NOTES.md
          fi
